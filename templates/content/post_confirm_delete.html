{% extends 'base.html' %}

{% block title %}Удаление поста{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-danger text-white">
                <h3>Подтверждение удаления</h3>
            </div>
            <div class="card-body">
                <p class="lead">Вы уверены, что хотите удалить пост "{{ object.title }}"?</p>
                <p class="text-danger">Это действие нельзя отменить!</p>
                
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">
                        Да, удалить
                    </button>
                    <a href="{% url 'content:post_detail' object.pk %}" class="btn btn-secondary">
                        Отмена
                    </a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
